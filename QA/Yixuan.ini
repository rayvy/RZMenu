[Constants]
; RZM Hover Detect — transform profiles
global $RZMWorldProfileCB0 = 125
global $RZMWorldProfileCB1 = 0
global $RZMWorldProfileMode = 10
global $RZMMenuProfileCB0 = 127
global $RZMMenuProfileCB1 = 0
global $RZMMenuProfileMode = 12

; ============================================================
; RZM Hover Detect - per-component detect shaders
; ============================================================

[CustomShaderRZMDetectYixuanBody]
; Component-level GPU cursor hit detector.
; cs-t2 = ObjectMap (hoverable objects in this component)
; cs-u0 = shared accumulator (closest hit across all dispatches)
cs = /modules/rzm_object_detect.hlsl
cs-t0 = vb0
cs-t1 = ib
cs-t2 = ResourceRZMDetectYixuanBodyObjectMap
cs-cb0 = vs-cb0
cs-cb1 = vs-cb1
cs-u0 = ResourceRZMDetectID
x24 = $cursorX
y24 = $cursorY
z24 = $screenW
w24 = $screenH
x25 = $isMouseButtonDown
x26 = $RZMWorldProfileCB0
y26 = $RZMWorldProfileCB1
z26 = $RZMWorldProfileMode
w26 = 2
if $isGameMenu == 1
	x26 = $RZMMenuProfileCB0
	y26 = $RZMMenuProfileCB1
	z26 = $RZMMenuProfileMode
	w26 = 2
endif
dispatch = 1, 1, 1

; ============================================================
; RZM Hover Detect - pin shader
; Reads best hit from frame accumulator, writes to pinned
; R32_FLOAT ID buffer and extended info buffer, resets accumulator for next frame.
; ============================================================

[CustomShaderRZMPinDetected]
cs = /modules/rzm_pin_detected.hlsl
cs-u0 = ResourceRZMDetectID
cs-u1 = ResourceRZMPinnedDetectID
cs-u2 = ResourceRZMPinnedDetectInfo
dispatch = 1, 1, 1

; ============================================================
; RZM Hover Detect - throttled store (called via pre run)
; store is expensive (CPU readback). Run once every 30 frames.
; ============================================================

[CommandListRZMPinDetected]
local $rzm_detect_counter
local $rzm_detect_threshold = 60
$rzm_detect_counter = $rzm_detect_counter + 1

if $isMouseButtonDown == 1
	$rzm_detect_counter = $rzm_detect_threshold
endif

if $inputMode == 0

	if $hoveredID > 0
		$Detected = -1
		$ObjectDetectAllowed = 0
	else
		$ObjectDetectAllowed = 1
		if $rzm_detect_counter >= ($rzm_detect_threshold - $CursorIsMoved * 50)
			run = CustomShaderRZMPinDetected
			store = $Detected, ResourceRZMPinnedDetectID, 0
			$rzm_detect_counter = 0
		endif
	endif

else 
	$Detected = -1
	$ObjectDetectAllowed = 0
endif

; ============================================================
; RZM Jiggle Interaction — YixuanBody
; Jiggle colliders: 10
;   IDs: 172461, 176724, 178572, 180420, 182334, 186597, 188511, 190191, 192351, 194511
; ============================================================

[CustomShaderRZMJiggleYixuanBody]
local $CursorXPast
local $CursorYPast
local $WasMouseButtonDown

if $isMouseButtonDown == 1
	if $WasMouseButtonDown == 0
		$CursorXPast = $cursorX
		$CursorYPast = $cursorY
		ResourceRZMDetectCapturedID_YixuanBody = copy ResourceRZMDetectID
	endif
	$WasMouseButtonDown = 1
	w67 = 1
else
	$WasMouseButtonDown = 0
	$CursorXPast = 0
	$CursorYPast = 0
	w67 = 0
endif

cs = ./modules/rzm_jiggle_interaction.hlsl

x67 = $CursorXPast
y67 = $CursorYPast

; Default physics params (overridden per-object in shader via t68)
x68 = 0.5
y68 = 1.00
z68 = 6.0
w68 = 1.00

x69 = $cursorX
y69 = $cursorY
z69 = $screenW
w69 = $screenH

x70 = 0.86
y70 = 0.176
z70 = 0.93
w70 = 0.08

x71 = 0.50
y71 = 1.10
z71 = 1.00
w71 = 0.00

; [72].x = number of jiggle collider entries in ResourceRZMJiggleParams
x72 = 10
y72 = $rzm_jiggle_mult_radius
z72 = $rzm_jiggle_mult_strength
w72 = $rzm_jiggle_mult_spring
x73 = $rzm_jiggle_mult_damping

cs-t67 = ResourceRZMDetectCapturedID_YixuanBody
cs-t68 = ResourceRZMJiggleParams_YixuanBody
cs-t69 = ResourceRZMDetectID
cs-t70 = ResourceRZMJiggleMask_YixuanBody

cs-u6 = ResourceRZMJiggleState_YixuanBody

ResourceRZMJiggleTempVB0_YixuanBody = vb0
cs-t24 = vb0
cs-u5 = copy ResourceRZMJiggleTempVB0_YixuanBody

