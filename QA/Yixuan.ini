[CommandListHSV_21Helper]

local $_X = $HSV_X
local $_Y = $HSV_Y
local $_Z = $HSV_Z
local $_W = $HSV_W

if $id == $clickTriggerID || $capturedID == $id
	if $id == $clickTriggerID || $capturedID == $id
		local $centerX = $positionX + ($sizeX * 0.5)
		local $centerY = $positionY + ($sizeY * 0.5)
		local $cursorDX = $cursorX - $centerX
		local $cursorDY = $cursorY - $centerY
		local $distSq = ($cursorDX * $cursorDX) + ($cursorDY * $cursorDY)

		local $R_out = $sizeX * 0.5
		local $R_in = $sizeX * 0.35
		local $R_outSq = $R_out * $R_out
		local $R_inSq = $R_in * $R_in

		; 1. Проверка попадания в полукольцо (Hue)
		local $isInsideRing = 0
		if $cursorDX > 0 && $distSq <= $R_outSq && $distSq >= $R_inSq
			$isInsideRing = 1
		endif

		; 2. Расчет тригонометрии поворота треугольника на основе Hue ($HSV_X)
		local $angle = $_X * $pi
		$mathinA = $angle
		run = CommandListMathCos
		local $cosVal = $mathout

		$mathinA = $angle
		run = CommandListMathSin
		local $sinVal = $mathout

		; 3. Обратный поворот координат курсора (Unrotation)
		local $rotated_dx = $cursorDX / $sizeMultiplier
		local $rotated_dy = $cursorDY / $sizeMultiplier

		local $unrotated_dx = $rotated_dx * $cosVal + $rotated_dy * $sinVal
		local $unrotated_dy = -$rotated_dx * $sinVal + $rotated_dy * $cosVal

		local $abs_x = $unrotated_dx
		if $abs_x < 0
			$abs_x = -$abs_x
		endif

		; 4. Проверка попадания в треугольник (Sat & Val)
		local $isInsideTriangle = 0
		if $unrotated_dy <= 0.0 && $unrotated_dy >= -100.0
			if (3.0 * $unrotated_dy + 300.0) >= (5.0 * $abs_x)
				$isInsideTriangle = 1
			endif
		endif

		; ВЫЧИСЛЕНИЯ ПРИ УСПЕШНОМ КЛИКЕ:
		; Если кликнули в кольцо
		if $isInsideRing == 1
			$mathinA = $cursorDY
			$mathinB = $cursorDX
			run = CommandListMathATan2
			$_X = ($mathout + 1.570796) / 3.141592
		endif

		; Если кликнули в треугольник
		if $isInsideTriangle == 1
			local $VS = $unrotated_dy / -100.0
			if $VS < 0.0
				$VS = 0.0
			elif $VS > 1.0
				$VS = 1.0
			endif

			local $V = ($unrotated_dx + 60.0 + 60.0 * $VS) / 120.0
			if $V < 0.0
				$V = 0.0
			elif $V > 1.0
				$V = 1.0
			endif

			local $S = 0.0
			if $V > 0.001
				$S = $VS / $V
			endif
			if $S < 0.0
				$S = 0.0
			elif $S > 1.0
				$S = 1.0
			endif

			$_Y = $S
			$_Z = $V
		endif
	endif

endif

if $id == $capturedID && $dragState == 3
	if $id == $capturedID && $dragState == 3
		local $isNewHold = 0
		if $holdTimer < $RzmLastHoldTimer
			$isNewHold = 1
		endif
		if $holdTimer < 0.3
			$isNewHold = 1
		endif
		$RzmLastHoldTimer = $holdTimer

		local $centerX = $positionX + ($sizeX * 0.5)
		local $centerY = $positionY + ($sizeY * 0.5)
		local $cursorDX = $cursorX - $centerX
		local $cursorDY = $cursorY - $centerY
		local $distSq = ($cursorDX * $cursorDX) + ($cursorDY * $cursorDY)

		local $R_out = $sizeX * 0.5
		local $R_in = $sizeX * 0.35
		local $R_outSq = $R_out * $R_out
		local $R_inSq = $R_in * $R_in

		; 1. Проверка попадания в полукольцо (Hue)
		local $isInsideRing = 0
		if $cursorDX > 0 && $distSq <= $R_outSq && $distSq >= $R_inSq
			$isInsideRing = 1
		endif

		; 2. Расчет тригонометрии
		local $angle = $_X * $pi
		$mathinA = $angle
		run = CommandListMathCos
		local $cosVal = $mathout

		$mathinA = $angle
		run = CommandListMathSin
		local $sinVal = $mathout

		; 3. Обратный поворот координат курсора (Unrotation)
		local $rotated_dx = $cursorDX / $sizeMultiplier
		local $rotated_dy = $cursorDY / $sizeMultiplier

		local $unrotated_dx = $rotated_dx * $cosVal + $rotated_dy * $sinVal
		local $unrotated_dy = -$rotated_dx * $sinVal + $rotated_dy * $cosVal

		local $abs_x = $unrotated_dx
		if $abs_x < 0
			$abs_x = -$abs_x
		endif

		; 4. Проверка попадания в треугольник (Sat & Val)
		local $isInsideTriangle = 0
		if $unrotated_dy <= 0.0 && $unrotated_dy >= -100.0
			if (3.0 * $unrotated_dy + 300.0) >= (5.0 * $abs_x)
				$isInsideTriangle = 1
			endif
		endif

		; ФАЗА 1: ПЕРВИЧНЫЙ ЗАХВАТ ЗОНЫ
		if $isNewHold == 1
			if $isInsideRing == 1
				$RZM_WHEEL_VALID = 1
				$RZM_TRIANGLE_VALID = 0
			elif $isInsideTriangle == 1
				$RZM_WHEEL_VALID = 0
				$RZM_TRIANGLE_VALID = 1
			else
				; Кликнули мимо всего — отпускаем мышь
				$RZM_WHEEL_VALID = 0
				$RZM_TRIANGLE_VALID = 0
				$dragState = 0
				$capturedID = -1
			endif
		endif

		; ФАЗА 2: ВЫЧИСЛЕНИЕ ВО ВРЕМЯ ДВИЖЕНИЯ МЫШИ
		; Если тянем ползунок полукольца
		if $RZM_WHEEL_VALID == 1
			$mathinA = $cursorDY
			$mathinB = $cursorDX
			run = CommandListMathATan2
			$_X = ($mathout + 1.570796) / 3.141592

			; Зажим для кольца
			if $cursorDX < 0
				if $cursorDY < 0
					$_X = 0.0
				else
					$_X = 1.0
				endif
			endif
		endif

		; Если тянем точку внутри треугольника
		if $RZM_TRIANGLE_VALID == 1
			local $VS = $unrotated_dy / -100.0
			if $VS < 0.0
				$VS = 0.0
			elif $VS > 1.0
				$VS = 1.0
			endif

			local $V = ($unrotated_dx + 60.0 + 60.0 * $VS) / 120.0
			if $V < 0.0
				$V = 0.0
			elif $V > 1.0
				$V = 1.0
			endif

			local $S = 0.0
			if $V > 0.001
				$S = $VS / $V
			endif
			if $S < 0.0
				$S = 0.0
			elif $S > 1.0
				$S = 1.0
			endif

			$_Y = $S
			$_Z = $V
		endif
	endif

endif

$HSV_X = $_X
$HSV_Y = $_Y
$HSV_Z = $_Z
$HSV_W = $_W

