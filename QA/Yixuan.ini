[CommandListElementHSV_TRIANGLE_CURSOR_158]
$classType = 0
$id = 158
$isPreset = 0
$isElement = 1
w111 = $id
local $ValueX24Interpolated
$LocalVisibility = 0
local $hoverInterpolate
local $clickInterpolate
$LocalVisibility = 1
run = CommandListRestoreElement
if $LocalVisibility
	local $LocalHoverTimer
	local $LocalHoldTimer
	if $LocalHoldTimer > 0
		$LocalHoldTimer = $LocalHoldTimer - $dt  
	endif
	local $P_PX
	local $P_PY
	local $P_SX
	local $P_SY

	$positionX = ($PositionX)
	$positionY = ($PositionY)

	$sizeX = ($SizeX) * $sizeMultiplier
	$sizeY = ($SizeY) * $sizeMultiplier

	local $H = $HSV_X
	local $S = $HSV_Y
	local $V = $HSV_Z

	; Ограничиваем физический диапазон треугольника [0.0, 1.0], чтобы курсор никогда не вылетал наружу
	if $S < 0.0
		$S = 0.0
	elif $S > 1.0
		$S = 1.0
	endif

	if $V < 0.0
		$V = 0.0
	elif $V > 1.0
		$V = 1.0
	endif

	; 2. Расчет базовых смещений относительно центра (136, 136) на нескейленном гриде 272х272
	; Вершины: Apex=(0, -104), Left (Black)=(-60, 0), Right (White)=(60, 0)
	local $unrotated_dx = -60.0 + $V * (120.0 - 60.0 * $S)
	local $unrotated_dy = $V * (-104.0 * $S)

	; 3. Расчет угла поворота на основе Hue ($HSV_X) для HALF-CIRCLE (угол = H * pi)
	local $angle = $H * $pi

	; 4. Вычисление Синуса и Косинуса угла с помощью функций RZMenu
	$mathinA = $angle
	run = CommandListMathCos
	local $cosVal = $mathout

	$mathinA = $angle
	run = CommandListMathSin
	local $sinVal = $mathout

	; 5. Поворот локальных координат вокруг центра (136, 136)
	local $rotated_dx = $unrotated_dx * $cosVal - $unrotated_dy * $sinVal
	local $rotated_dy = $unrotated_dx * $sinVal + $unrotated_dy * $cosVal

	; 6. Приведение к глобальным экранным координатам с учетом скейла меню и спасенных координат родителя
	local $centerX = $positionX + ($SizeX / 2.0)
	local $centerY = $positionY + ($SizeY / 2.0)

	local $targetCursorX = $centerX + $rotated_dx * $sizeMultiplier
	local $targetCursorY = $centerY + $rotated_dy * $sizeMultiplier

	; 7. Корректировка под левый верхний край самого курсора (чтобы он был центрирован)
	local $cursorSizeX = 16 * $sizeMultiplier
	local $cursorSizeY = 16 * $sizeMultiplier

	$positionX = $targetCursorX - ($cursorSizeX / 2.0)
	$positionY = $targetCursorY - ($cursorSizeY / 2.0)
	$sizeX = $cursorSizeX
	$sizeY = $cursorSizeY

	$PositionX = $positionX
	$PositionY = $positionY
	$SizeX = $sizeX
	$SizeY = $sizeY
	$P_PX = $PositionX
	$P_PY = $PositionY
	$P_SX = $SizeX
	$P_SY = $SizeY
	;Underlayer Presets
	w23 = $hoverInterpolate
	z23 = $clickInterpolate

	$colorR = ($HSV_X )
	$colorG = $HSV_Y - 1
	$colorB = $HSV_Z  - 1
	$colorA = 1
	if $LocalVisibility
		$positionX = $P_PX
		$positionY = $P_PY
		$sizeX = $P_SX
		$sizeY = $P_SY
		$element_align = 0
		run = CommandListCoreAlignment.Check
		run = CommandListCoreFNUpdateHoverState

		if $id == $clickTriggerID
			;сюда клик формулу
			$clickInterpolate = 1
		endif

		if $id == $capturedID && $dragState == 3
			;сюда ховер формулу
		endif

		$elemFlags = 5
		w111 = $id
		x111 = $elemFlags

		; style allocation (ID +1 offset: 0 = no style, 1+ = actual styles)
		y110 = 0

		;val HeadIndex
		run = CustomShaderRCI2D

		if ($cursorX >= $positionX && $cursorX <= ($positionX + $sizeX) && $cursorY >= $positionY && $cursorY <= ($positionY + $sizeY))
			$hoverInterpolate = $hoverInterpolate + (1 - $hoverInterpolate) * ($dtCustom + 0.0069)
		else
			$hoverInterpolate = $hoverInterpolate + (0 - $hoverInterpolate) * ($dtCustom + 0.0069)
		endif
		$clickInterpolate = $clickInterpolate + (0 - $clickInterpolate) * ($dtCustom + 0.0069)
		;Presets
		w23 = $hoverInterpolate
		z23 = $clickInterpolate

		z23 = 0
		w23 = 0

		$PositionX = $P_PX
		$PositionY = $P_PY
		$SizeX = $P_SX
		$SizeY = $P_SY
		run = CommandListElementContainer_159_159

	endif
endif

