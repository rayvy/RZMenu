local $safeY
$safeY = $mathinA
if $safeY == 0
	$safeY = 0.00001
endif
local $absX
$absX = $safeX
if $absX < 0
	$absX = -$absX
endif
local $absY
$absY = $safeY
if $absY < 0
	$absY = -$absY
endif
local $z
local $invert
$invert = 0
if $absY > $absX
	$z = $safeX / $safeY
	$invert = 1
else
	$z = $safeY / $safeX
endif
local $z2
$z2 = $z * $z
local $atan
$atan = $z / (1.0 + 0.28 * $z2)
if $invert == 1
	local $signY
	$signY = 1
	if $safeY < 0
