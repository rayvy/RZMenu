	$atan = (1.570796 * $signY) - $atan
endif
if $safeX < 0
	local $signY2
	$signY2 = 1
	if $safeY < 0
		$signY2 = -1
	endif
	local $offset
	$offset = 3.141592 * $signY2
	$atan = $atan + $offset
endif
$mathout = $atan
