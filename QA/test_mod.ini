    endif

        if $SKC_PussyPenetratorInput > 0.005
            $shape_changed = 1
        endif

        $SKC_PussyPenetratorFreq = ($SKC_PussyPenetratorFreq + $SKC_PussyPenetratorInput * $dt) % 1.0
        if $SKC_PussyPenetratorFreq < 0
            $SKC_PussyPenetratorFreq = $SKC_PussyPenetratorFreq + 1
        endif

        local $SKC_PussyPenetratorWeight
        $SKC_PussyPenetratorWeight = 0

        if $PlayMode == 1
            $SKC_PussyPenetratorWeight = $PlayProgress
        else

        local $SKC_PussyPenetratorTime
        local $SKC_PussyPenetratorDuration

        $SKC_PussyPenetratorTime = ($SKC_PussyPenetratorFreq * 10.0) % 1
        if $SKC_PussyPenetratorTime < 0
            $SKC_PussyPenetratorTime = $SKC_PussyPenetratorTime + 1
        endif

        $SKC_PussyPenetratorDuration = 1.0 - 0.0

        if $SKC_PussyPenetratorDuration > 0 && $SKC_PussyPenetratorTime >= 0.0 && $SKC_PussyPenetratorTime <= 1.0
            local $SKC_PussyPenetratorProgress
            $SKC_PussyPenetratorProgress = ($SKC_PussyPenetratorTime - 0.0) / $SKC_PussyPenetratorDuration

                $mathinA = $SKC_PussyPenetratorProgress * $pi
                run = CommandListMathSin
                $SKC_PussyPenetratorWeight = $mathout
        endif

        endif

        $SKC_PussyPenetratorFinal = $SKC_PussyPenetratorWeight * 1.0

    post $SKC_PussyPenetratorPast = $SKC_PussyPenetratorInput
