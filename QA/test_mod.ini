;Copy Pasted from https://github.com/SinsOfSeven/3dmigoto_math_lib
[Constants]
global $mathinA
global $mathinB
global $mathinC
global $mathout
global $RZM_WHEEL_VALID
global $RzmLastHoldTimer

[CommandListMathCos]
if $mathinA == inf || $mathinA == -inf || $mathinA == NaN || $mathinA == null
    $mathout = NaN
else
    local $x = ($mathinA+$pi/2)%$pi-$pi/2
    local $xx = $x*$x
    local $f0 = -($xx/2)
    local $f1 = (($xx*$xx)/24)
    local $f2 = -(($xx*$xx*$xx)/720)
    local $f3 = (($xx*$xx*$xx*$xx)/40320)
    local $f4 = -(($xx*$xx*$xx*$xx*$xx)/3628800)
    $mathout = -((($mathinA+$pi/2)/$pi)%2//1*2-1) * (1+$f0+$f1+$f2+$f3+$f4)
endif

[CommandListMathSin]
$mathinA = $mathinA - $pi / 2
run = CommandListMathCos
$mathout = $mathout

[CommandListMathTan]
$mathinA = $mathinA
run = CommandListMathSin
$mathinA = $mathinA
run = CommandListMathCos
$mathout = $mathout / $mathout

[CommandListMathATan2]
local $safeX
$safeX = $mathinB
if $safeX == 0
    $safeX = 0.00001
endif

local $safeY
$safeY = $mathinA
if $safeY == 0
    $safeY = 0.00001
endif

local $absX
$absX = $safeX
if $absX < 0
    $absX = -$absX
endif

local $absY
$absY = $safeY
if $absY < 0
    $absY = -$absY
endif

local $z
local $invert
$invert = 0

if $absY > $absX
    $z = $safeX / $safeY
    $invert = 1
else
    $z = $safeY / $safeX
endif

local $z2
$z2 = $z * $z

local $atan
$atan = $z / (1.0 + 0.28 * $z2)

if $invert == 1
    local $signY
    $signY = 1
    if $safeY < 0
        $signY = -1
    endif
    $atan = (1.570796 * $signY) - $atan
endif

if $safeX < 0
    local $signY2
    $signY2 = 1
    if $safeY < 0
        $signY2 = -1
    endif
    local $offset
    $offset = 3.141592 * $signY2
    $atan = $atan + $offset
endif

$mathout = $atan

[CommandListMathABS]
if $mathinA < 0
    $mathout = -$mathinA
else
    $mathout = $mathinA
endif

[CommandListMathClamp]
if $mathinA < 0
    $mathout = 0
else if $mathinA > 1
    $mathout = 1
else
    $mathout = $mathinA
endif

[CommandListMathSign]
if $mathinA < 0
    $mathout = -1
else if $mathinA > 0
    $mathout = 1
else
    $mathout = 0
endif

[CommandListMathMin]
if $mathinA < $mathinB
    $mathout = $mathinA
else
    $mathout = $mathinB
endif

[CommandListMathMax]
if $mathinA > $mathinB
    $mathout = $mathinA
else
    $mathout = $mathinB
endif

[CommandListMathLerp]
$mathout = $mathinA + $mathinC * ($mathinB - $mathinA)

[CommandListMathStep]
if $mathinA >= $mathinB
    $mathout = 1.0
else
    $mathout = 0.0
endif

[CommandListMathFract]
$mathout = $mathinA % 1
if $mathout < 0
    $mathout = $mathout + 1
endif

