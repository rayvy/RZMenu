    ; --- ГЛАВНЫЙ ЭЛЕМЕНТ (Квадрат Saturation/Value) ---
    [CommandListElementHSVBox_542]
    $id = 542
    $classType = 0
    local $LocalVisibility
    $LocalVisibility = 0
    if $page == 3
        $LocalVisibility = 1
    endif

    ; Переменные для хранения "родительских" координат квадрата
    local $P_PX
    local $P_PY
    local $P_SX
    local $P_SY

    if $LocalVisibility

        ; --- [СЦЕНАРИЙ 3] LOAD LOGIC: Загружаем данные из целей в буфер ---
        if $HeadIndex == 0
            $HSVBox_542_X = $EYEBROWS_X
            $HSVBox_542_Y = $EYEBROWS_Y
            $HSVBox_542_Z = $EYEBROWS_Z
        elif $HeadIndex == 1
            $HSVBox_542_X = $EYELASHES_X
            $HSVBox_542_Y = $EYELASHES_Y
            $HSVBox_542_Z = $EYELASHES_Z
        elif $HeadIndex == 2
            $HSVBox_542_X = $LIPS_X
            $HSVBox_542_Y = $LIPS_Y
            $HSVBox_542_Z = $LIPS_Z
        elif $HeadIndex == 3
            $HSVBox_542_X = $LIPS_X
            $HSVBox_542_Y = $LIPS_Y
            $HSVBox_542_Z = $LIPS_Z
        elif $HeadIndex == 4
            $HSVBox_542_X = $EYE_X
            $HSVBox_542_Y = $EYE_Y
            $HSVBox_542_Z = $EYE_Z
        elif $HeadIndex == 5
            $HSVBox_542_X = $HAIR_X
            $HSVBox_542_Y = $HAIR_Y
            $HSVBox_542_Z = $HAIR_Z
        endif
        ; ------------------------------------------------------------------

        ; 1. Генерируем позицию и размер стандартным методом движка

            $positionX = $positionX + 411
            $positionY = $positionY + 450

            $sizeX = (146) * $sizeMultiplier
            $sizeY = (136) * $sizeMultiplier

        ; 2. СРАЗУ сохраняем эти данные.
        $P_PX = $PositionX
        $P_PY = $PositionY
        $P_SX = $SizeX
        $P_SY = $SizeY
        $PositionY = $PositionY + ($SizeY * 0.10)
        $SizeY = $SizeY * 0.9

        ; --- Взаимодействие (Квадрат) ---
        run = CommandListCoreFNUpdateHoverState
        run = CommandListNavProcessElement
        run = CommandListCoreFNHandleClick
        run = CommandListCoreFNHandleHold
        ; Хелпер меняет локальные var_H/S/V (или целевые, если сценарий 2)
        run = CommandListElementHSVBox_542_Helper

        ; --- Отрисовка HSV квадрата ---
        $drawType = 728386
        $texPosX = $HSVBox_542_X
        $colorA = 1.0
        run = CustomShaderRCI2D

        ; --- Отрисовка курсора внутри квадрата ---
        local $cursorPosX = $P_PX + ($P_SX * $HSVBox_542_Y)
        local $cursorPosY = $P_PY + ($P_SY * (1.0 - $HSVBox_542_Z))

        ; Тень курсора
        $drawType = 728387
        $positionX = $cursorPosX - 6
        $positionY = $cursorPosY - 6
        $sizeX = 12
        $sizeY = 12
        $colorR = 0.0
        $colorG = 0.0
        $colorB = 0.0
        $colorA = 0.7
        run = CustomShaderRCI2D

        ; Сам курсор
        $positionX = $cursorPosX - 5
        $positionY = $cursorPosY - 5
        $sizeX = 10
        $sizeY = 10
        $colorR = 1.0
        $colorG = 1.0
        $colorB = 1.0
        $colorA = 1.0
        run = CustomShaderRCI2D

        ; 3. ВАЖНО: Восстанавливаем координаты КВАДРАТА для слайдера
        $PositionX = $P_PX
        $PositionY = $P_PY
        $SizeX = $P_SX
        $SizeY = $P_SY

        ; --- Вызов слайдера Hue ---
        ; Слайдер может изменить var_H
        run = CommandListElementHSVBox_542_HueSlider

        ; --- [СЦЕНАРИЙ 3] SAVE LOGIC: Выгружаем буфер обратно в цели ---
        ; Делаем это ПОСЛЕ helpers и HueSlider, чтобы сохранить свежие изменения
        if $HeadIndex == 0
            $EYEBROWS_X = $HSVBox_542_X
            $EYEBROWS_Y = $HSVBox_542_Y
            $EYEBROWS_Z = $HSVBox_542_Z
        elif $HeadIndex == 1
            $EYELASHES_X = $HSVBox_542_X
            $EYELASHES_Y = $HSVBox_542_Y
            $EYELASHES_Z = $HSVBox_542_Z
        elif $HeadIndex == 2
            $LIPS_X = $HSVBox_542_X
            $LIPS_Y = $HSVBox_542_Y
            $LIPS_Z = $HSVBox_542_Z
        elif $HeadIndex == 3
            $LIPS_X = $HSVBox_542_X
            $LIPS_Y = $HSVBox_542_Y
            $LIPS_Z = $HSVBox_542_Z
        elif $HeadIndex == 4
            $EYE_X = $HSVBox_542_X
            $EYE_Y = $HSVBox_542_Y
            $EYE_Z = $HSVBox_542_Z
        elif $HeadIndex == 5
            $HAIR_X = $HSVBox_542_X
            $HAIR_Y = $HSVBox_542_Y
            $HAIR_Z = $HSVBox_542_Z
        endif
        ; ---------------------------------------------------------------

    endif

    ; --- ХЕЛПЕР ГЛАВНОГО ЭЛЕМЕНТА ---
    [CommandListElementHSVBox_542_Helper]
    if $capturedID == 542
        local $s_val = ($cursorX - $positionX) / $sizeX
        local $v_val = 1.0 - (($cursorY - $positionY) / $sizeY)

        if $s_val < 0.0
            $s_val = 0.0
        endif
        if $s_val > 1.0
            $s_val = 1.0
        endif
        if $v_val < 0.0
            $v_val = 0.0
        endif
        if $v_val > 1.0
            $v_val = 1.0
        endif

        $HSVBox_542_Y = $s_val
        $HSVBox_542_Z = $v_val
    endif

    if $isGamepadEditing == 1 && $GamepadEditedID == 542
        local $hold_speed = 0.35
        if $nav_key_request_right == 1
            $HSVBox_542_Y = $HSVBox_542_Y + ($hold_speed * $dt * 2)
        endif
        if $nav_key_request_left == 1
            $HSVBox_542_Y = $HSVBox_542_Y - ($hold_speed * $dt * 2)
        endif
        if $nav_key_request_down == 1
            $HSVBox_542_Z = $HSVBox_542_Z + ($hold_speed * $dt * 2)
        endif
        if $nav_key_request_up == 1
            $HSVBox_542_Z = $HSVBox_542_Z - ($hold_speed * $dt * 2)
        endif
        if $HSVBox_542_Y > 1.0
            $HSVBox_542_Y = 1.0
        endif
        if $HSVBox_542_Y < 0.0
            $HSVBox_542_Y = 0.0
        endif
        if $HSVBox_542_Z > 1.0
            $HSVBox_542_Z = 1.0
        endif
        if $HSVBox_542_Z < 0.0
            $HSVBox_542_Z = 0.0
        endif
    endif

    ; --- ЭЛЕМЕНТ: СЛАЙДЕР HUE ---
    [CommandListElementHSVBox_542_HueSlider]
    $id = 10542
    $classType = 4
    local $LocalVisibility
    $LocalVisibility = 1

    if $LocalVisibility
        ; Сдвигаем Y: Позиция Y квадрата + Высота квадрата + Отступ (20)
        $positionY = $positionY

        ; Высота слайдера фиксированная, ширина такая же как у квадрата
        $sizeY = $SizeY * 0.10

        ; --- Взаимодействие ---
        run = CommandListCoreFNUpdateHoverState
        run = CommandListNavProcessElement
        run = CommandListCoreFNHandleClick
        run = CommandListCoreFNHandleHold
        run = CommandListElementHSVBox_542_HueSlider_Helper

        ; --- Отрисовка градиента ---
        $drawType = 728388
        $colorA = 1.0
        run = CustomShaderRCI2D

        ; --- Курсор слайдера ---
        local $cursorPosX = $positionX + ($sizeX * $HSVBox_542_X)

        $drawType = 0
        $positionX = $cursorPosX - 2
        $positionY = $positionY - 2
        $sizeX = 4
        $sizeY = $sizeY + 4

        $colorR = 1.0
        $colorG = 1.0
        $colorB = 1.0
        $colorA = 1.0
        run = CustomShaderRCI2D
    endif

    ; --- ХЕЛПЕР СЛАЙДЕРА HUE ---
    [CommandListElementHSVBox_542_HueSlider_Helper]
    if $capturedID == 10542
        local $h_val = ($cursorX - $positionX) / $sizeX
        if $h_val < 0.0
            $h_val = 0.0
        endif
        if $h_val > 1.0
            $h_val = 1.0
        endif
        $HSVBox_542_X = $h_val
    endif

    if $isGamepadEditing == 1 && $GamepadEditedID == 10542
        local $hold_speed = 0.35
        if $nav_key_request_right == 1
            $HSVBox_542_X = $HSVBox_542_X + ($hold_speed * $dt)
        endif
        if $nav_key_request_left == 1
            $HSVBox_542_X = $HSVBox_542_X - ($hold_speed * $dt)
        endif
        if $HSVBox_542_X > 1.0
            $HSVBox_542_X = 1.0
        endif
        if $HSVBox_542_X < 0.0
            $HSVBox_542_X = 0.0
        endif
    endif

