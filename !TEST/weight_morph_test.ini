; =====================================================================
; EFMI WEIGHT MORPHING TEST SNIPPET
; =====================================================================
; Этот конфиг демонстрирует использование weight_shape_linear_ENDFIELD.hlsl
; для динамического изменения весов костей (Bone Weights) в рантайме.

[Constants]
; Коэффициент морфинга весов (0.0 - Базис, 1.0 - Шейпкей)
global persist $WeightKey = 1.0

[Present]
; Здесь можно добавить логику управления ключом, например:
; $WeightKey = abs(sin(time))

; Запуск вычислений весов
run = CustomShaderComputeWeights

[CustomShaderComputeWeights]
cs = ./basic_pack/modules/weight_shape_linear_ENDFIELD.hlsl

; u5 (RW) - Рабочий буфер весов. 
; В EFMI веса обычно лежат в VB2 (ComponentX_VB2.buf) со страйдом 12 байт.
; Перед началом итераций шейпкеев инициализируем его Базисом.
cs-u5 = copy ResourceWeights_Base

; Передача параметров в шейдер (IniParams[88].x)
x88 = $WeightKey

; t50 - Ссылка на Базис (нужна шейдеру для вычисления дельты)
cs-t50 = copy ResourceWeights_Base

; t51 - Ссылка на Шейпкей с целевыми весами
; ВАЖНО: Если шейпкеев несколько, этот блок (t51 + Dispatch) повторяется для каждого.
; Наш шейдер "умный": он умеет аккумулировать изменения и перевыбирать ТОП-4 кости.
cs-t51 = copy ResourceWeights_Target_Shape1

; Dispatch - количество потоков (равно количеству вершин в буфере)
; Если вершин например 5432, ставим 5432.
Dispatch = 5432, 1, 1

; Очистка биндингов после выполнения
cs-u5 = null
cs-t50 = null
cs-t51 = null


; --- ОПРЕДЕЛЕНИЕ РЕСУРСОВ ---

[ResourceWeights_Base]
type = Buffer
stride = 12
filename = ./Meshes/Component0_VB2.buf

[ResourceWeights_Target_Shape1]
type = Buffer
stride = 12
; Файл весов для конкретного шейпкея (должен быть экспортирован аддоном)
filename = ./SK/Component0_Weights_Shape1.buf
